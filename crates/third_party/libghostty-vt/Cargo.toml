[package]
name = "libghostty-vt"
version = "0.1.1"
description = "Safe Rust API for libghostty-vt, the Ghostty terminal emulation library"
readme = "README.md"
edition = "2024"
rust-version = "1.93"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uzaaft/libghostty-rs"
resolver = "2"

[features]
allocator_api = ["dep:allocator-api2"]

[lib]
name = "libghostty_vt"
path = "src/lib.rs"

[dependencies.allocator-api2]
version = "0.4.0"
optional = true

[dependencies.bitflags]
version = "2.11.0"

[dependencies.int-enum]
version = "1.2.0"

[dependencies.libghostty-vt-sys]
version = "0.1.1"

[dev-dependencies.libghostty-vt-sys]
version = "0.1.1"
