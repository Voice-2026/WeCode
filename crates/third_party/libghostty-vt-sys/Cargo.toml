[package]
name = "libghostty-vt-sys"
version = "0.1.1"
description = "Raw FFI bindings for libghostty-vt, the Ghostty terminal emulation library"
readme = "README.md"
edition = "2024"
rust-version = "1.93"
license = "MIT OR Apache-2.0"
repository = "https://github.com/uzaaft/libghostty-rs"
links = "ghostty-vt"
build = "build.rs"
resolver = "2"

[features]
default = ["vendored"]
vendored = []
bindgen-tool = ["dep:bindgen", "dep:libc"]

[lib]
name = "libghostty_vt_sys"
path = "src/lib.rs"

[dependencies.bindgen]
version = "0.72.1"
optional = true

[dependencies.libc]
version = "0.2"
optional = true

[build-dependencies]

[[bin]]
name = "gen-bindings"
path = "tools/gen_bindings.rs"
required-features = ["bindgen-tool"]
