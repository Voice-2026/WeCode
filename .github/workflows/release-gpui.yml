name: Release GPUI Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Source tag to build, for example v1.0.0-beta.1."
        required: false
        default: v1.0.0-beta.1
        type: string
      channel:
        description: "Update channel to publish."
        required: false
        default: auto
        type: choice
        options:
          - auto
          - beta
          - stable

permissions:
  contents: write

env:
  MACOSX_DEPLOYMENT_TARGET: "14.0"
  CMAKE_OSX_DEPLOYMENT_TARGET: "14.0"

jobs:
  metadata:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      channel: ${{ steps.meta.outputs.channel }}
      source_ref: ${{ steps.ref.outputs.source_ref }}
    env:
      SOURCE_REF: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Resolve source ref
        id: ref
        shell: bash
        run: echo "source_ref=${SOURCE_REF}" >> "$GITHUB_OUTPUT"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Resolve release metadata
        id: meta
        shell: bash
        env:
          RELEASE_NOTES_PATH: dist/release-notes.md
        run: |
          mkdir -p dist
          requested_channel="${{ github.event_name == 'workflow_dispatch' && inputs.channel || 'auto' }}"
          node scripts/release/prepare-release.mjs "${SOURCE_REF}" "${requested_channel}"

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: dist/release-notes.md
          if-no-files-found: error

  build:
    needs: metadata
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: macos-aarch64
            os: macos-15
            target: aarch64-apple-darwin
          - id: macos-x86_64
            os: macos-15-intel
            target: x86_64-apple-darwin
          - id: windows-x86_64
            os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}
    env:
      CARGO_BUILD_TARGET: ${{ matrix.target }}
      RELEASE_BUILD_ID: ${{ matrix.id }}
      RELEASE_STAGE_DIR: release-artifacts
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install NSIS
        if: runner.os == 'Windows'
        shell: powershell
        run: choco install nsis -y --no-progress

      - name: Cache Rust build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: rust-${{ runner.os }}-${{ matrix.id }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            rust-${{ runner.os }}-${{ matrix.id }}-
            rust-${{ runner.os }}-

      - name: Apply release version
        shell: bash
        env:
          RELEASE_NOTES_PATH: dist/release-notes.md
        run: |
          mkdir -p dist
          node scripts/release/prepare-release.mjs "${{ needs.metadata.outputs.source_ref }}" "${{ needs.metadata.outputs.channel }}"

      - name: Import Apple signing certificate
        if: startsWith(matrix.id, 'macos-') && env.APPLE_CERTIFICATE != '' && env.APPLE_CERTIFICATE_PASSWORD != '' && env.KEYCHAIN_PASSWORD != ''
        shell: bash
        run: |
          certificate_path="$RUNNER_TEMP/apple-certificate.p12"
          keychain_path="$RUNNER_TEMP/apple-signing.keychain-db"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security default-keychain -s "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -k "$keychain_path"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed 's/[\" ]//g')
          security find-identity -v -p codesigning "$keychain_path"

      - name: Build
        shell: bash
        run: cargo build --release --target "${CARGO_BUILD_TARGET}"

      - name: Package
        shell: bash
        run: node scripts/release/package-gpui.mjs

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: package-${{ matrix.id }}
          path: release-artifacts/${{ matrix.id }}/*
          if-no-files-found: error

  publish:
    needs:
      - metadata
      - build
    runs-on: ubuntu-latest
    env:
      RELEASE_VERSION: ${{ needs.metadata.outputs.version }}
      RELEASE_CHANNEL: ${{ needs.metadata.outputs.channel }}
      RELEASE_TAG: ${{ needs.metadata.outputs.source_ref }}
      RELEASE_NOTES_PATH: dist/release-notes.md
      RELEASE_ARTIFACTS_DIR: release-artifacts
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.metadata.outputs.source_ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: dist

      - name: Download packages
        uses: actions/download-artifact@v4
        with:
          pattern: package-*
          path: release-artifacts
          merge-multiple: true

      - name: Publish GitHub release and update metadata
        run: node scripts/release/publish-github-release.mjs
