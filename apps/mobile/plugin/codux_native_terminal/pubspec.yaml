name: codux_native_terminal
description: Native terminal view bridge for Codux Flutter.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.11.5
  flutter: ">=3.35.0"

dependencies:
  flutter:
    sdk: flutter

flutter:
  plugin:
    platforms:
      android:
        package: com.codux.native_terminal
        pluginClass: CoduxNativeTerminalPlugin
      ios:
        pluginClass: CoduxNativeTerminalPlugin
