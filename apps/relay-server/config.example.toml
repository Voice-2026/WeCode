[server]
# HTTP/WebSocket listen address.
# Use "127.0.0.1:8088" for local-only binding or ":8088" for all interfaces.
addr = ":8088"
read_header_timeout_seconds = 10

[database]
path = "codux-service.sqlite3"

[stats]
# Side-channel JSONL relay statistics. This does not participate in protocol state.
enabled = true
path = "codux-service.stats.jsonl"
flush_interval_seconds = 10

[pairing]
# Pairing QR lifetime.
ttl_seconds = 300

[shutdown]
# Graceful shutdown timeout before force exit.
timeout_seconds = 3
